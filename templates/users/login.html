{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Big Roller Club & Bar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f7f0 0%, #e8f5e9 50%, #f0f7f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(46, 125, 50, 0.04) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(212, 168, 75, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-wrapper { position: relative; z-index: 1; width: 100%; }
        .login-card {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem;
            background: #fff;
            border: 1px solid #c8e6c9;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #2e7d32, #388e3c);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.25);
        }
        .login-logo .logo-icon i { font-size: 2rem; color: #fff; }
        .login-logo h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, #d4a84b, #e6b95a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 0.5rem;
        }
        .login-logo p { color: #8aaa8a; font-size: 0.9rem; }
        .login-card .form-control { background: #f8fcf8; border: 1px solid #c8e6c9; }
        .login-card .form-control:focus {
            border-color: #d4a84b;
            box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.12);
            background: #fff;
        }
        .login-card .input-group-text {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #4a7a4a;
        }
        .login-card .btn-gold { padding: 0.75rem; font-size: 1rem; }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #8aaa8a;
            font-size: 0.8rem;
        }
        .login-footer i { color: #d4a84b; }
        .password-toggle {
            cursor: pointer;
            user-select: none;
        }
        .password-toggle:hover { color: var(--accent-gold) !important; }
        .error-text { color: #c0392b; font-size: 0.8rem; display: none; margin-top: 0.25rem; }
        .is-invalid { border-color: #c0392b !important; }
        .is-invalid:focus { box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12) !important; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="bi bi-cup-straw"></i>
                </div>
                <h1>Big Roller</h1>
                <p>Club & Bar Management System</p>
            </div>
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'danger' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="post" id="login-form" onsubmit="return validateLogin()">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="error-text" id="username-error">Please enter your username</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
                        <span class="input-group-text password-toggle" onclick="togglePassword()" id="toggle-btn">
                            <i class="bi bi-eye" id="toggle-icon"></i>
                        </span>
                    </div>
                    <div class="error-text" id="password-error">Please enter your password</div>
                </div>
                <button type="submit" class="btn btn-gold w-100 py-2">Sign In</button>
            </form>
            <div class="login-footer">
                <i class="bi bi-cup-straw"></i> Big Roller Club & Bar
            </div>
        </div>
    </div>
    <script>
        function togglePassword() {
            var pwd = document.getElementById('password');
            var icon = document.getElementById('toggle-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
        function validateLogin() {
            var valid = true;
            var username = document.getElementById('username');
            var password = document.getElementById('password');
            var uErr = document.getElementById('username-error');
            var pErr = document.getElementById('password-error');
            username.classList.remove('is-invalid');
            password.classList.remove('is-invalid');
            uErr.style.display = 'none';
            pErr.style.display = 'none';
            if (!username.value.trim()) {
                username.classList.add('is-invalid');
                uErr.style.display = 'block';
                valid = false;
            }
            if (!password.value.trim()) {
                password.classList.add('is-invalid');
                pErr.style.display = 'block';
                valid = false;
            }
            return valid;
        }
        document.getElementById('username').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            document.getElementById('username-error').style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            document.getElementById('password-error').style.display = 'none';
        });
    </script>
</body>
</html>
