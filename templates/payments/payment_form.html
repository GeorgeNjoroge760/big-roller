{% extends 'base.html' %}
{% block title %}Record Payment{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="page-header">
        <h1><i class="bi bi-cash"></i> Record Payment</h1>
        <p>Order #{{ order.order_number }}</p>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Amount (Ksh)</label>
                            <input type="number" step="0.01" name="amount" class="form-control" value="{{ order.total_amount }}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Method</label>
                            <select name="method" class="form-select">
                                <option value="cash">Cash</option>
                                <option value="card">Card</option>
                                <option value="mobile">Mobile Money</option>
                                <option value="mpesa">M-Pesa</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gold"><i class="bi bi-check-lg"></i> Record Payment</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
